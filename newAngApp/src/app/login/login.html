          <form>
            <!-- Username -->
            <div class="mb-3">
              <label for="username" class="form-label">User Name</label>
              <input type="email" [(ngModel)]="username" name="username" class="form-control" id="email"
                placeholder="Mobile number / Email Id">
            </div>

            <!-- Password -->
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" [(ngModel)]="password" name="password" class="form-control" id="password"
                placeholder="Password">
            </div>


            <!-- Submit Button -->
            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary w-100" (click)="onSubmit()">LOGIN</button>
              <a class="btn btn-primary" routerLink="/signup">Signup</a>
            </div>
          </form>
        </div>
      </div>
    </div>
