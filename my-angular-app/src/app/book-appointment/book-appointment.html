  <mat-divider></mat-divider>

    <!-- Appointment Details -->
    <h3 class="section-title">Enter Appointment Details</h3>

    <div class="form-grid">

      <mat-form-field appearance="outline">
        <mat-label>Specialization</mat-label>
        <mat-select formControlName="specialization">
          <mat-option *ngFor="let s of specializations" [value]="s">
            {{ s }}
          </mat-option>
        </mat-select>
        <mat-error *ngIf="f['specialization'].invalid">
          Required
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Doctor</mat-label>
        <mat-select formControlName="doctorId">
          <mat-option *ngFor="let d of filteredDoctors" [value]="d.id">
            {{ d.name }}
          </mat-option>
        </mat-select>
        <mat-error *ngIf="f['doctorId'].invalid">
          Required
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Appointment Date</mat-label>
        <input
          matInput
          [matDatepicker]="apptPicker"
          formControlName="appointmentDate"
          [min]="minDateStr" />
        <mat-datepicker-toggle matSuffix [for]="apptPicker"></mat-datepicker-toggle>
        <mat-datepicker #apptPicker></mat-datepicker>
        <mat-error *ngIf="form.errors?.['dateInPast']">
          Date cannot be in past
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Time Slot</mat-label>
        <mat-select formControlName="slot" [disabled]="availableSlots.length === 0">
          <mat-option *ngFor="let s of availableSlots" [value]="s">
            {{ s }}
          </mat-option>
        </mat-select>
        <mat-hint *ngIf="availableSlots.length === 0">
          Select doctor & date to load slots
        </mat-hint>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Reason for Visit</mat-label>
        <textarea matInput rows="3" formControlName="reason"></textarea>
        <mat-error *ngIf="f['reason'].invalid">
          Reason is required (min 5 chars)
        </mat-error>
      </mat-form-field>

    </div>

    <!-- Actions -->
    <div class="form-actions">
      <button mat-stroked-button type="button" (click)="onClickBack()">
        Back
      </button>

      <button mat-raised-button color="primary" type="submit"
              [disabled]="form.invalid">
        Book Appointment
      </button>
    </div>

  </form>
</mat-card>
</div>
