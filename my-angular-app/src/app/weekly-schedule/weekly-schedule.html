<mat-card class="mat-elevation-z2">
  <mat-card-title>Weekly Availability</mat-card-title>
  <mat-card-subtitle>
    Toggle slots as Available or Leave. Booked slots are locked.
  </mat-card-subtitle>

  <div class="controls" [formGroup]="form">
    <mat-form-field appearance="outline">
      <mat-label>Week (pick any date)</mat-label>
      <input matInput [matDatepicker]="dp" formControlName="anyDateInWeek" (dateChange)="buildWeek()">
      <mat-datepicker-toggle matSuffix [for]="dp"></mat-datepicker-toggle>
      <mat-datepicker #dp></mat-datepicker>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Slot minutes</mat-label>
      <mat-select formControlName="slotMinutes" (selectionChange)="buildWeek()">
        <mat-option [value]="10">10</mat-option>
        <mat-option [value]="15">15</mat-option>
        <mat-option [value]="20">20</mat-option>
        <mat-option [value]="30">30</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Day start</mat-label>
      <input matInput formControlName="dayStart" placeholder="09:00" (blur)="buildWeek()">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Day end</mat-label>
      <input matInput formControlName="dayEnd" placeholder="17:00" (blur)="buildWeek()">
    </mat-form-field>

    <button mat-raised-button color="primary" (click)="save()">
      <mat-icon>save</mat-icon>
      Save
    </button>

    <mat-progress-spinner *ngIf="loading" diameter="22" mode="indeterminate"></mat-progress-spinner>
  </div>

  <div class="legend">
    <span class="dot available"></span> Available
    <span class="dot leave"></span> Leave
    <span class="dot booked"></span> Booked
  </div>

  <!-- Matrix -->
  <div class="matrix" *ngIf="columns.length">
    <!-- header row -->
    <div class="cell head time"></div>
    <div class="cell head" *ngFor="let col of columns">{{ col.label }}</div>

    <!-- body rows -->
    <ng-container *ngFor="let t of timeLabels; let rowIndex = index">
      <div class="cell time">{{ t }}</div>

      <div class="cell" *ngFor="let col of columns">
        <button
          mat-stroked-button
          class="slot"
          [ngClass]="chipClass(col.slots[rowIndex].status)"
          [disabled]="col.slots[rowIndex].status === 'BOOKED'"
          (click)="onSlotClick(col.slots[rowIndex])">

          <mat-icon *ngIf="col.slots[rowIndex].status === 'BOOKED'">lock</mat-icon>
          <mat-icon *ngIf="col.slots[rowIndex].status === 'LEAVE'">free_cancellation</mat-icon>
          <mat-icon *ngIf="col.slots[rowIndex].status === 'AVAILABLE'">check_circle</mat-icon>
        </button>
      </div>
    </ng-container>
  </div>
</mat-card>
