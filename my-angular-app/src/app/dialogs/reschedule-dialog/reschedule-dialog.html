<h2 mat-dialog-title>Reschedule Appointment</h2>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">

    <mat-dialog-content>
      <mat-form-field appearance="outline">
        <mat-label>Appointment Date</mat-label>
        <input
          matInput
          [matDatepicker]="apptPicker"
          formControlName="appointmentDate"
          [min]="minDateStr" />
        <mat-datepicker-toggle matSuffix [for]="apptPicker"></mat-datepicker-toggle>
        <mat-datepicker #apptPicker></mat-datepicker>
        <mat-error *ngIf="form.errors?.['dateInPast']">
          Date cannot be in past
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Time Slot</mat-label>
        <mat-select formControlName="slot" [disabled]="availableSlots.length === 0">
          <mat-option *ngFor="let s of availableSlots" [value]="s">
            {{ s }}
          </mat-option>
        </mat-select>
        <mat-hint *ngIf="availableSlots.length === 0">
          Select date to load slots
        </mat-hint>
      </mat-form-field>
    </mat-dialog-content>

    <mat-dialog-actions align="end">
      <button mat-button (click)="close()">Cancel</button>
      <button mat-raised-button color="primary"
      type="submit"
              [disabled]="form.invalid"
              >
        Confirm
      </button>
    </mat-dialog-actions>

      </form>
